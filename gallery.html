<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galéria</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #222;
      color: white;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 40px;
      height: 40px;
    }

    nav {
      display: flex;
      gap: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
    }

    main {
      padding: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
    }

    .post {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .post img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    .dark-mode {
      background: #121212;
      color: white;
    }

    .dark-mode header,
    .dark-mode footer {
      background: black;
    }

    .dark-mode .post {
      background: #1e1e1e;
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="logo">
    <span>Oldal neve</span>
  </div>

  <nav>
    <a href="index.html">Főoldal</a>
    <a href="gallery.html">Galéria</a>
    <a href="email.html">Email</a>
    <a href="about.html">About</a>
    <a href="#" onclick="toggleDarkMode()">⚙️</a>
  </nav>
</header>

<main>
  <h1>Galéria</h1>

  <section class="gallery" id="gallery"></section>
</main>

<footer>
  <img src="logo.png" alt="logo" width="40"><br>
  sebesyten
</footer>

<script>
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
  }

  // POSZTOK (itt tudod majd bővíteni)
  const posts = [
    {
      title: "Első firka",
      date: "2026-03-25",
      image: "img1.jpg"
    },
    {
      title: "Második firka",
      date: "2026-03-24",
      image: "img2.jpg"
    },
    {
      title: "Harmadik firka",
      date: "2026-03-23",
      image: "img3.jpg"
    }
  ];

  const gallery = document.getElementById("gallery");

  // kirajzolás
  posts.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <img src="${post.image}" alt="">
      <p>${post.title}</p>
      <small>${post.date}</small>
    `;

    gallery.appendChild(div);
  });
</script>

</body>
</html>
