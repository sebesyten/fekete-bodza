<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #222;
      color: white;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 40px;
      height: 40px;
    }

    nav {
      display: flex;
      gap: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    main {
      padding: 40px;
      max-width: 800px;
      margin: auto;
      text-align: center;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    .dark-mode {
      background: #121212;
      color: white;
    }

    .dark-mode header,
    .dark-mode footer {
      background: black;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="logo">
    <span>Oldal neve</span>
  </div>

  <nav>
    <a href="index.html">Főoldal</a>
    <a href="gallery.html">Galéria</a>
    <a href="email.html">Email</a>
    <a href="about.html">About</a>
    <a href="#" onclick="toggleDarkMode()">⚙️</a>
  </nav>
</header>

<main>
  <h1>Rólam</h1>

  <p>
    Ez az oldal firkák és rövid gondolatok gyűjteménye.
  </p>

  <p>
    Itt bármit írhatsz magadról:
    miért kezdted,
    mit jelentenek a rajzok,
    vagy bármi személyes.
  </p>

  <p>
    Később ezt teljesen testre szabhatod.
  </p>
</main>

<footer>
  <img src="logo.png" alt="logo" width="40"><br>
  sebesyten
</footer>

<script>
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
  }
</script>

</body>
</html>
