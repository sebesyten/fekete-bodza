<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Memóriajáték</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

h1 {
    margin-top: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 15px;
    justify-content: center;
    margin: 30px;
}

.box {
    width: 100px;
    height: 100px;
    border-radius: 10px;
    cursor: pointer;
    opacity: 0.8;
    transition: 0.2s;
}

.box.active {
    opacity: 1;
    transform: scale(1.1);
}

button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Memóriajáték</h1>

<div class="grid" id="grid"></div>

<button onclick="startGame()">Play</button>

<script>
const colors = [
    "#ff6666","#66ff66","#6666ff",
    "#ffff66","#ff66ff","#66ffff",
    "#ffa500","#00ffcc","#cc66ff"
];

let sequence = [];
let playerSequence = [];
let canClick = false;

const grid = document.getElementById("grid");

// négyzetek létrehozása
colors.forEach((color, index) => {
    const div = document.createElement("div");
    div.classList.add("box");
    div.style.backgroundColor = color;
    div.dataset.index = index;

    div.addEventListener("click", () => handleClick(index));

    grid.appendChild(div);
});

function startGame() {
    sequence = [];
    playerSequence = [];
    canClick = false;

    // 5 random lépés
    for (let i = 0; i < 5; i++) {
        sequence.push(Math.floor(Math.random() * 9));
    }

    playSequence();
}

function playSequence() {
    let i = 0;

    const interval = setInterval(() => {
        const boxes = document.querySelectorAll(".box");
        const index = sequence[i];

        boxes[index].classList.add("active");

        setTimeout(() => {
            boxes[index].classList.remove("active");
        }, 400);

        i++;
        if (i >= sequence.length) {
            clearInterval(interval);
            canClick = true;
        }
    }, 700);
}

function handleClick(index) {
    if (!canClick) return;

    playerSequence.push(index);

    if (playerSequence[playerSequence.length - 1] !== sequence[playerSequence.length - 1]) {
        alert("Rossz sorrend! Próbáld újra.");
        resetGame();
        return;
    }

    if (playerSequence.length === sequence.length) {
        alert("Gratulálok! 🎉");
        resetGame();
    }
}

function resetGame() {
    sequence = [];
    playerSequence = [];
    canClick = false;
}
</script>

</body>
</html>
