<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Főoldal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #222;
      color: white;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 40px;
      height: 40px;
    }

    nav {
      display: flex;
      gap: 15px;
    }

    nav button {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    main {
      padding: 30px;
    }

    .latest-post {
      text-align: center;
      margin-bottom: 40px;
    }

    .latest-post img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
    }

    .post {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }

    .post img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    /* Dark mode */
    .dark-mode {
      background: #121212;
      color: white;
    }

    .dark-mode header,
    .dark-mode footer {
      background: black;
    }

    .dark-mode .post {
      background: #1e1e1e;
    }

    @media (max-width: 900px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="logo">
    <span>Oldal neve</span>
  </div>

 <nav>
  <a href="index.html">Főoldal</a>
  <a href="gallery.html">Galéria</a>
  <a href="email.html">Email</a>
  <a href="about.html">About</a>
  <a href="#" onclick="toggleDarkMode()">⚙️</a>
</nav>

<style>

  nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

  nav a:hover {
  text-decoration: underline;
}
  
</style>

</header>

<main>

  <section class="latest-post">
    <img src="latest.jpg" alt="legújabb">
    <h2>Legújabb poszt címe</h2>
    <p>2026.03.25</p>
  </section>

  <section class="gallery">

    <div class="post">
      <img src="img1.jpg" alt="">
      <p>Rövid szöveg</p>
    </div>

    <div class="post">
      <img src="img2.jpg" alt="">
      <p>Rövid szöveg</p>
    </div>

    <div class="post">
      <img src="img3.jpg" alt="">
      <p>Rövid szöveg</p>
    </div>

    <div class="post">
      <img src="img4.jpg" alt="">
      <p>Rövid szöveg</p>
    </div>

    <div class="post">
      <img src="img5.jpg" alt="">
      <p>Rövid szöveg</p>
    </div>

  </section>

</main>

<footer>
  <img src="logo.png" alt="logo" width="40"><br>
  sebesyten
</footer>

<script>
  function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
  }
</script>

</body>
</html>
