<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>fekete-bodza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #ff9999;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 30px;
            text-align: center;
        }

        .kepek {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .kepek img {
            width: 300px;
            border-radius: 10px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>szevasz báttya</h1>
</header>

<main>
    <h2>Példa képek</h2>

    <div class="kepek">
        <img src="https://picsum.photos/300/200?1" alt="Kép 1">
        <img src="https://picsum.photos/300/200?2" alt="Kép 2">
        <img src="https://picsum.photos/300/200?3" alt="Kép 3">
    </div>

    <p>Ez egy egyszerű weboldal három képpel.</p>
</main>

<footer>
    <p>© 2026 sebesyten</p>
</footer>

</body>
</html>
