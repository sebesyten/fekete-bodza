<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Az első weboldalam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 30px;
            text-align: center;
        }

        img {
            max-width: 400px;
            border-radius: 10px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>Üdvözöllek a weboldalamon!</h1>
</header>

<main>
    <h2>Egy példa kép</h2>
    <img src="https://picsum.photos/400/250" alt="Példa kép">
    <p>Ez egy egyszerű weboldal fejléc-, kép- és lábléc résszel.</p>
</main>

<footer>
    <p>© 2026 Az én weboldalam</p>
</footer>

</body>
</html>
