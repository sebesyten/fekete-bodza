<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>szevasz báttya</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background-color:#f4f4f4;
}

header{
    background-color:#ff9999;
    color:white;
    padding:20px;
    text-align:center;
}

main{
    padding:30px;
    text-align:center;
}

.szinek{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.szinDoboz{
    width:200px;
    height:200px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:#333;
}

footer{
    background-color:#333;
    color:white;
    text-align:center;
    padding:15px;
    position:fixed;
    bottom:0;
    width:100%;
}
</style>
</head>

<body>

<header>
<h1>csá!</h1>
</header>

<main>

<h2>random színek</h2>

<div class="szinek">
<div class="szinDoboz" id="szin1"></div>
<div class="szinDoboz" id="szin2"></div>
<div class="szinDoboz" id="szin3"></div>
</div>

</main>

<footer>
<p>© 2026 sebesyten</p>
</footer>

<script>
function randomSzin(){
    return "#" + Math.floor(Math.random()*16777215).toString(16);
}

function ujSzinek(){
    for(let i=1;i<=3;i++){
        let szin = randomSzin();
        let doboz = document.getElementById("szin"+i);
        doboz.style.backgroundColor = szin;
        doboz.textContent = szin;
    }
}

ujSzinek();
</script>

</body>
</html>
